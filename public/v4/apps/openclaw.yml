captainVersion: 4
caproverOneClickApp:
    instructions:
        start: |-
            Deploying OpenClaw optimized for **CometAPI**.
            This setup enables WebSockets and defaults to Gemini 3 Flash.
        end: |-
            OpenClaw is online! 🚀

            **Access your Dashboard:**
            URL: https://$$cap_appname.$$cap_root_domain/?token=$$cap_openclaw_token
    displayName: OpenClaw
    isOfficial: false
    description: AI agent runtime with CometAPI and Gemini-3-Flash support.
    variables:
        - id: $$cap_openclaw_token
          label: Gateway Token
          defaultValue: 21baa96407eee45ece25258f
          description: Your UI access token used in the URL ?token=...
        - id: $$cap_comet_key
          label: CometAPI Key
          defaultValue: ''
          description: Your API key for CometAPI.
        - id: $$cap_comet_base_url
          label: CometAPI Base URL
          defaultValue: 'https://api.cometapi.com/v1'
          description: The OpenAI-compatible endpoint.
        - id: $$cap_model_id
          label: Model ID
          defaultValue: 'gemini-3-flash'
          description: The primary model to use.

services:
    $$cap_appname:
        image: fourplayers/openclaw:latest
        restart: always
        environment:
            OPENCLAW_GATEWAY_TOKEN: $$cap_openclaw_token
            OPENAI_API_KEY: $$cap_comet_key
            OPENAI_BASE_URL: $$cap_comet_base_url
            OPENAI_MODEL: $$cap_model_id
            OPENCLAW_MODEL: $$cap_model_id
            AGENTS_DEFAULTS_MODEL_PRIMARY: $$cap_model_id
        caproverExtra:
            containerHttpPort: '18789'
            websocketSupport: 'true'
        volumes:
            - $$cap_appname-data:/data
